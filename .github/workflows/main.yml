name: Compile Chronos Apex APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java 11 (Legacy Compatibility)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '11'

      - name: Set up Flutter 3.10 (Pre-AGP 8.0)
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.10.0'

      - name: Generate Android Workspace
        run: flutter create --platforms android .

      - name: Set Hardware Minimum SDK
        run: sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 23/g' android/app/build.gradle

      - name: Fetch Dependencies
        run: flutter pub get

      - name: Compile APK
        run: flutter build apk --release

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Chronos-Apex-App
          path: build/app/outputs/flutter-apk/app-release.apk
