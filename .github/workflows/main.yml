name: Compile Chronos Apex APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.19.0'

      - name: Construct Base Target Directory
        run: |
          flutter create --platforms android .
          rm -rf test

      - name: Fetch Core Libraries
        run: flutter pub get

      - name: Assemble Production Release
        run: flutter build apk --release --no-pub

      - name: Export Output Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Chronos-Apex-App
          path: build/app/outputs/flutter-apk/app-release.apk
