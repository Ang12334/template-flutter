name: Compile Chronos Apex APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java 11 (Legacy Compatibility)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '11'

      - name: Set up Flutter 3.10
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.10.0'

      - name: Build and Package
        run: |
          # 1. Create a pristine workspace inside a subfolder to bypass ALL file conflicts
          flutter create --project-name chronos_apex --org com.chronos.apex --platforms android pristine_build
          
          # 2. Inject your perfectly written code into the clean workspace
          cp pubspec.yaml pristine_build/
          cp -r lib pristine_build/
          
          # 3. Enter the clean workspace
          cd pristine_build
          
          # 4. Bump the Android API level for Bluetooth Hardware access
          sed -i 's/flutter.minSdkVersion/23/g' android/app/build.gradle
          
          # 5. Compile the app cleanly
          flutter pub get
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Chronos-Apex-App
          path: pristine_build/build/app/outputs/flutter-apk/app-release.apk
